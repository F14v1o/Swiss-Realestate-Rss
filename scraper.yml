name: News Scraper

on:
  schedule:
    # Runs twice daily: 06:00 and 18:00 UTC
    # = 07:00 / 19:00 Switzerland Winter Time (CET)
    # = 08:00 / 20:00 Switzerland Summer Time (CEST)
    - cron: '0 6,18 * * *'

  # Allows manual triggering from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Hard kill after 15 minutes if something hangs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SCRAPER_DB_URL: ${{ secrets.SCRAPER_DB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py
